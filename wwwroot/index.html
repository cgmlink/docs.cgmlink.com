<!doctype html>
<html>
    <head>
        <title>CGM Link API Reference</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="apple-mobile-web-app-title" content="CGM Link" />
        <meta name="description" content="API reference documentation for CGM Link. Take control of your diabetes with real-time glucose monitoring, and insulin and diet tracking with CGM Link for Android and iOS."

        <meta name="author" content="CGM Link" />
        <meta property="og:site_name" content="CGM Link API Reference" />
        <meta property="og:url" content="/" />
        <meta property="og:title" content="CGM Link API Reference" />
        <meta
            property="og:description"
            content="API reference documentation for CGM Link. Take control of your diabetes with real-time glucose monitoring, and insulin and diet tracking with CGM Link for Android and iOS."
        />
        <meta property="og:type" content="website" />
        <link
            rel="icon"
            type="image/png"
            href="https://www.cgmlink.com/assets/favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="https://www.cgmlink.com/assets/favicon.svg" />
        <link rel="shortcut icon" href="https://www.cgmlink.com/assets/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="https://www.cgmlink.com/assets/apple-touch-icon.png"
        />

        <link rel="stylesheet" href="/styles.css" />
    </head>

    <body>
        <header class="custom-header scalar-app">
            <img
                src="https://www.cgmlink.com/assets/img/logo.svg"
                height="40"
                alt="CGM Link Logo"
            />
        </header>
        <div id="app"></div>

        <!-- Load the Script -->
        <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

        <!-- Initialize the Scalar API Reference -->
        <script>
            Scalar.createApiReference("#app", {
                // The URL of the OpenAPI/Swagger document
                url: "https://api.cgmlink.com/swagger/v1/swagger.json",
                // Temporary avoid CORS issues
                proxyUrl: "https://proxy.scalar.com",
                telemetry: false,
                authentication: {
                    preferredSecurityScheme: "bearer",
                },
                agent: {
                    disabled: true,
                },
                mcp: {
                    disabled: true,
                },
                hideTestRequestButton: true,
            });
        </script>
    </body>
</html>
