<!doctype html>
<html>
    <head>
        <title>CGM Link API Reference</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="/wwwroot/styles.css" />
    </head>

    <body>
        <header class="custom-header scalar-app">
  <img src="https://www.cgmlink.com/assets/img/logo.svg" height="40" alt="CGM Link Logo">
</header>
        <div id="app"></div>

        <!-- Load the Script -->
        <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

        <!-- Initialize the Scalar API Reference -->
        <script>
            Scalar.createApiReference("#app", {
                // The URL of the OpenAPI/Swagger document
                url: "https://api.glucopilot.co.uk/swagger/v1/swagger.json",
                // Temporary avoid CORS issues
                proxyUrl: "https://proxy.scalar.com",
                telemetry: false,
                authentication: {
                    preferredSecurityScheme: 'bearer',
                },
                agent: {
                    disabled: true,
                },
                mcp: {
                    disabled: true,
                },
                hideTestRequestButton: true,
            });
        </script>
    </body>
</html>
